<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Track — BusTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --surface: #0f1520; --card: #141b2a; --border: #1e2a40;
      --accent: #00d4ff; --text: #e8eef8; --muted: #6b7c99; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; gap: 16px; padding: 0 24px; height: 60px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #0099bb); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    .search-area {
      display: flex; align-items: center; gap: 8px; flex: 1; max-width: 400px;
    }
    .phone-input {
      flex: 1; padding: 9px 14px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .phone-input:focus { border-color: var(--accent); }
    .btn-track {
      padding: 9px 18px; background: var(--accent); color: #000; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-track:hover { box-shadow: 0 4px 12px rgba(0,212,255,0.3); }

    .login-link {
      margin-left: auto; padding: 8px 16px; border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); text-decoration: none; font-size: 13px; white-space: nowrap;
      transition: all 0.2s;
    }
    .login-link:hover { border-color: var(--accent); color: var(--accent); }

    #map { flex: 1; }

    /* Info Overlay */
    .info-card {
      position: absolute; top: 76px; right: 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; width: 280px; z-index: 1000;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      display: none;
    }
    .info-card.show { display: block; }
    .info-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
    .info-status { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .live { background: var(--green); animation: pulse 1.5s infinite; box-shadow: 0 0 8px var(--green); }
    .offline { background: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-value { font-weight: 500; text-align: right; }

    .prompt-card {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; width: 340px; text-align: center;
      z-index: 1000; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .prompt-card h3 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .prompt-card p { color: var(--muted); font-size: 14px; margin-bottom: 16px; line-height: 1.6; }
    .demo-btns { display: flex; flex-direction: column; gap: 8px; }
    .demo-btn {
      padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .demo-btn:hover { border-color: var(--accent); color: var(--accent); }

    .toast {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--red); color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; z-index: 2000; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <div class="logo-icon">🚌</div>
      Bus<span>Track</span>
    </a>

    <div class="search-area">
      <input class="phone-input" type="tel" id="phoneInput" placeholder="Driver's phone number...">
      <button class="btn-track" onclick="trackPhone()">📍 Track</button>
    </div>

    <a href="login.html" class="login-link">Sign In →</a>
  </div>

  <div id="map" style="position:relative; flex:1;"></div>

  <!-- Prompt -->
  <div class="prompt-card" id="promptCard">
    <div style="font-size:48px;margin-bottom:16px;">📍</div>
    <h3>Quick Bus Tracker</h3>
    <p>Enter a driver's phone number above to track their bus live on the map. No account needed.</p>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Try these demo numbers:</div>
    <div class="demo-btns">
      <button class="demo-btn" onclick="trackDemo('9876543210')">🚌 9876543210 — Route A (Ravi Kumar)</button>
      <button class="demo-btn" onclick="trackDemo('9876543211')">🚌 9876543211 — Route B (Suresh Patel)</button>
    </div>
  </div>

  <!-- Info Card -->
  <div class="info-card" id="infoCard">
    <button class="info-close" onclick="document.getElementById('infoCard').classList.remove('show')">✕</button>
    <div class="info-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">—</span>
    </div>
    <div class="info-row"><span class="info-label">Bus</span><span class="info-value" id="infoBus">—</span></div>
    <div class="info-row"><span class="info-label">Driver</span><span class="info-value" id="infoDriver">—</span></div>
    <div class="info-row"><span class="info-label">Phone</span><span class="info-value" id="infoPhone">—</span></div>
    <div class="info-row"><span class="info-label">Route</span><span class="info-value" id="infoRoute" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;">—</span></div>
    <div class="info-row" id="locationRow" style="display:none">
      <span class="info-label">Location</span>
      <span class="info-value" id="infoLocation">—</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="../shared/config.js"></script>
  <script>
    const map = L.map('map').setView(BUSTRACK_CONFIG.DEFAULT_CENTER, BUSTRACK_CONFIG.DEFAULT_ZOOM);
    L.tileLayer(BUSTRACK_CONFIG.MAP_TILE, { attribution: BUSTRACK_CONFIG.MAP_ATTRIBUTION }).addTo(map);

    let marker = null;
    let trackedBusId = null;

    function createIcon() {
      return L.divIcon({
        className: '',
        html: `<div style="
          background:#00d4ff; width:40px; height:40px; border-radius:50%;
          display:flex; align-items:center; justify-content:center;
          font-size:20px; border:3px solid #fff;
          box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 24px rgba(0,212,255,0.5);
        ">🚌</div>`,
        iconSize: [40, 40], iconAnchor: [20, 20]
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function trackPhone() {
      const phone = document.getElementById('phoneInput').value.trim();
      if (!phone) return showToast('Enter a phone number');
      await doTrack(phone);
    }

    async function trackDemo(phone) {
      document.getElementById('phoneInput').value = phone;
      await doTrack(phone);
    }

    async function doTrack(phone) {
      try {
        const data = await btFetch('/track/' + phone);
        document.getElementById('promptCard').style.display = 'none';

        document.getElementById('infoBus').textContent = data.busNumber;
        document.getElementById('infoDriver').textContent = data.driverName;
        document.getElementById('infoPhone').textContent = data.driverPhone;
        document.getElementById('infoRoute').textContent = data.route;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        if (data.isActive) {
          statusDot.className = 'status-dot live';
          statusText.textContent = '🟢 Live Tracking';
          statusText.style.color = '#10b981';
        } else {
          statusDot.className = 'status-dot offline';
          statusText.textContent = '⚫ Bus Offline';
          statusText.style.color = '#6b7c99';
        }

        if (data.location) {
          const { lat, lng } = data.location;
          document.getElementById('locationRow').style.display = 'flex';
          document.getElementById('infoLocation').textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);

          if (marker) marker.setLatLng([lat, lng]);
          else marker = L.marker([lat, lng], { icon: createIcon() }).addTo(map);
          map.flyTo([lat, lng], 15, { animate: true, duration: 1.5 });
        } else {
          document.getElementById('locationRow').style.display = 'none';
        }

        trackedBusId = data.busId;
        document.getElementById('infoCard').classList.add('show');

        // Subscribe to live updates
        socket.emit('user:subscribe', { busId: data.busId });
      } catch (e) {
        showToast('Driver not found: ' + e.message);
      }
    }

    const socket = io(BUSTRACK_CONFIG.SOCKET_URL);
    socket.on('bus:location', ({ busId, location }) => {
      if (busId !== trackedBusId) return;
      const { lat, lng } = location;
      if (marker) marker.setLatLng([lat, lng]);
      else marker = L.marker([lat, lng], { icon: createIcon() }).addTo(map);
      document.getElementById('locationRow').style.display = 'flex';
      document.getElementById('infoLocation').textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);
    });

    socket.on('bus:status', ({ busId, status }) => {
      if (busId !== trackedBusId) return;
      const alive = status === 'active';
      document.getElementById('statusDot').className = 'status-dot ' + (alive ? 'live' : 'offline');
      document.getElementById('statusText').textContent = alive ? '🟢 Live Tracking' : '⚫ Bus Offline';
      document.getElementById('statusText').style.color = alive ? '#10b981' : '#6b7c99';
    });
  </script>
</body>
</html>
